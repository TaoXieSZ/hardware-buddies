; --- Tab5 (ESP32-P4) --------------------------------------------------------
; P0 bringup target (see docs/proposals/tab5-buddy.md). The official
; platformio espressif32 platform has NO ESP32-P4 support (Arduino core is
; frozen at 2.0.17) — the community pioarduino fork is required. Pinned to
; #55.03.35 (Arduino 3.3.5 / IDF 5.5.1): IDF 5.5.2 introduced a Tab5
; MIPI-DSI backlight-flicker regression (m5stack/M5GFX#185); re-pin once
; that lands. Board MUST be m5stack-tab5-p4 (in pioarduino since 55.03.35),
; NOT esp32-p4-evboard: WiFi rides ESP-Hosted/SDIO to the C6, and the
; evboard variant bakes in the Espressif devkit's SDIO pins (18/19/14-17)
; while Tab5 wires CLK12/CMD13/D0 11/D1 10/D2 9/D3 8/RST15 — wrong pins =
; WiFi.status() stuck at WL_STOPPED(254) forever. The m5stack_tab5 variant
; carries the right pin macros (BOARD_SDIO_ESP_HOSTED_*).
; M5Unified >=0.2.17 / M5GFX >=0.2.22 are hard floors: the screen panel
; changed to ST7121 in the 2026-04 batch and older libs white-screen.
; Source fully isolated under src/tab5/ (stackchan pattern).
[env:m5stack-tab5]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.35
board = m5stack-tab5-p4
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
board_build.flash_mode = qio
; The board json defaults to a 1.25MB app slot; the dashboard will grow —
; 16MB flash → default_16MB.csv (6.5MB app + 3.4MB fs for character packs).
board_build.partitions = default_16MB.csv
; clawd GIF pack lives on LittleFS — `pio run -e m5stack-tab5 -t uploadfs`
; pushes the repo data/ tree (same packs the sticks use).
board_build.filesystem = littlefs
; NOTE: factory units ship the C6 with esp-hosted slave 1.4.1, which this
; Arduino host stack (esp-hosted 2.8.x) cannot talk to — WiFi scans fail
; until the C6 is updated ONCE via tools/tab5-c6-updater/ (one-shot ESP-IDF
; firmware that flashes esp32c6-v2.8.5 over SDIO with 1.4.x-generation RPC).
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    ; ESP32-P4 native USB-Serial-JTAG on the USB-C OTG port.
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; WiFi rides ESP-Hosted to the on-board ESP32-C6 (the P4 has no radio).
    ; Credentials from wifi_secrets.ini, same mechanism as cores3-stackchan.
    -DTAB5_WIFI_SSID=\"${wifi_secrets.ssid}\"
    -DTAB5_WIFI_PASS=\"${wifi_secrets.pass}\"
build_src_filter = -<*> +<tab5/>
; M5GFX pinned to the develop BRANCH: the 2026-04-28 Tab5 batch switched the
; panel to ST7121, whose driver landed in develop on 2026-06-08 (M5GFX PR
; #201/#202 — maintainer: "check develop branch", author confirmed working on
; M5Tab5) and is NOT in any tagged release yet (0.2.22 = black screen on this
; batch). Re-pin to the registry release once 0.2.23+ ships with Panel_ST7121.
lib_deps =
    m5stack/M5Unified @ ^0.2.17
    https://github.com/m5stack/M5GFX.git#develop
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0

; ── Native unit-test env ──────────────────────────────────────────────
; Off-device unit tests for pure logic (no Arduino/M5Unified). Run with
;   pio test -e native
; build_src_filter excludes all firmware source — only the test/ files
; compile, and they #include the pure headers directly (-I src/stackchan).
[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu++17 -I src/stackchan
build_src_filter = -<*>
