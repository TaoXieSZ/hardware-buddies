; M5Unified-based: single source compiles for both M5StickC Plus and Plus2.
; Pick the env matching your hardware. Plus2 added 2026-05 for BugC2 work.
;
; The -claude / -cursor variants share source but differ in two compile-time
; constants: BLE advertising prefix (Claude- vs Cursor-) and default character
; pack (clawd vs calico). Same .bin behaviour otherwise. The plain "m5stickc-
; plus2" env keeps original defaults (Claude-, no default character → scan
; LittleFS) for backwards compatibility with existing flashed sticks.

[env:m5stickc-plus2]
platform = espressif32
board = m5stick-c
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = no_ota.csv
board_build.f_cpu = 160000000L
build_flags =
    -DCORE_DEBUG_LEVEL=0
build_src_filter = +<*> +<buddies/>
lib_deps =
    m5stack/M5Unified @ ^0.2.0
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0

[env:m5stickc-plus2-claude]
extends = env:m5stickc-plus2
; Pinned USB serial for the Claude-F7C2 stick on this dev machine
; (MAC 0c:8b:95:b8:f7:c0). The serial in /dev/cu.usbserial-XXX is the
; FTDI/CP210x chip's hardware serial, not the ESP32 MAC, so it's stable
; per cable+stick pairing. If you swap the stick or move to another Mac,
; rerun `tools/scan_sticks.sh` (or just `ls /dev/cu.usbserial*` + esptool
; chip_id) and update this line.
upload_port = /dev/cu.usbserial-586B0297061
monitor_port = /dev/cu.usbserial-586B0297061
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBUDDY_BRAND_PREFIX=\"Claude-\"
    -DBUDDY_BRAND_NAME=\"Claude\"
    -DBUDDY_DEFAULT_CHAR=\"clawd\"

[env:m5stickc-plus2-cursor]
extends = env:m5stickc-plus2
; Pinned USB serial for the Cursor-6DE2 stick on this dev machine
; (MAC 00:4b:12:a1:6d:e0). Same caveat as the -claude env above: the
; usbserial-XXX name is per cable+stick pair, so re-pin if you swap
; either. With both sticks plugged in simultaneously this prevents
; accidentally flashing the Claude one when you meant -cursor.
upload_port = /dev/cu.usbserial-6D5AEF1D38
monitor_port = /dev/cu.usbserial-6D5AEF1D38
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBUDDY_BRAND_PREFIX=\"Cursor-\"
    -DBUDDY_BRAND_NAME=\"Cursor\"
    -DBUDDY_VARIANT_CURSOR=1
    ; Default char is clawd — calico has a still-unidentified time-based
    ; green-channel pixel rot bug specifically on Plus 1.x sticks (cursor
    ; stick here is a Plus 1.1). clawd renders cleanly on the same stick
    ; using the same firmware + same render path, so it's calico-asset
    ; specific (or asset×Plus-1.x interaction). Disambiguation history
    ; ruled out: stale LittleFS, gifsicle palette quantization, BugC2
    ; Wire collision with AXP192, wider-than-screen GIFs, PMIC drift,
    ; flash corruption. Switching default to clawd unblocks Cursor IDE
    ; integration; calico investigation tracked as follow-up.
    -DBUDDY_DEFAULT_CHAR=\"clawd\"

[env:m5stickc-plus]
platform = espressif32
board = m5stick-c
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = no_ota.csv
board_build.f_cpu = 160000000L
build_flags =
    -DCORE_DEBUG_LEVEL=0
build_src_filter = +<*> +<buddies/>
lib_deps =
    m5stack/M5Unified @ ^0.2.0
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0

