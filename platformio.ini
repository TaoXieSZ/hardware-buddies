; --- StickS3 (ESP32-S3) ---------------------------------------------------
; Brand-new target added 2026-06-08: M5Stack StickS3 (SKU K150) — the
; ESP32-S3-PICO-1-N8R8 successor to the StickC Plus2. Same 1.14" ST7789
; 135x240 LCD, same BMI270 IMU, same stick form factor, so it reuses the
; Plus2 buddy firmware (src/*.cpp) almost verbatim — build_src_filter only
; drops the stackchan tree, the chassis selftests, and the PDM mic path.
;
; Why it "just works": m5_compat.h already routes every axp* wrapper through
; M5Unified's M5.Power / M5.Display / M5.Imu / M5.Rtc abstractions (no direct
; AXP192 register pokes), and the installed M5Unified (0.2.16) already knows
; board_M5StickS3 + bundles the M5PM1 PMIC driver (i2c 0x6E) + the ES8311
; speaker/mic enable callbacks. So M5.begin() auto-detects the board and
; configures display, IMU, buttons, and the ES8311 mic/speaker with zero
; firmware changes. No separate M5PM1 lib_dep needed for basic power.
;
; Critical: StickS3 has OCTAL PSRAM (N8R8) — memory_type MUST be qio_opi,
; same lesson as the CoreS3 octal-PSRAM static-audio bug noted below. The
; generic esp32-s3-devkitc-1 board defaults to quad mode and would randomise
; PSRAM DMA reads.
;
; Audio note: unlike the Plus2 (PDM mic on GPIO0, conflicts with BugC2 SDA),
; StickS3's mic is an ES8311 I2S codec on dedicated pins (MCLK=18 BCLK=17
; LRCK=15 DOUT=14 DIN=16, codec i2c 0x18 on 48/47). No GPIO collision — this
; is the on-device-capture path for the vibecoding mic feature. The PDM
; audio_capture.cpp / audio_ble.cpp are excluded; adpcm.cpp is kept for the
; upcoming ES8311 capture+stream work.
[env:m5stack-sticks3]
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = default_8MB.csv
; Octal PSRAM + octal flash (N8R8). Do NOT change to qio_qspi.
board_build.arduino.memory_type = qio_opi
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    ; ESP32-S3 native USB: Serial = USB CDC, so monitor/flash work over the
    ; single USB-C OTG port without an external UART bridge.
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; Marks the S3 stick build for any board-specific guards in src/*.cpp.
    -DBUDDY_BOARD_STICKS3=1
; Drop the stackchan firmware and the chassis selftests. Keep the full Plus2
; source set otherwise — including audio_capture.cpp / audio_ble.cpp: the PDM
; capture path is dormant (its init is commented out in main.cpp) but data.h's
; PTT-ack path calls audioBleHandlePttAck(), so audio_ble.cpp must link. Same
; source set Plus2 compiles, so it builds clean on S3; the ES8311 on-device
; capture for the vibecoding mic gets wired into these files in Phase 2.
build_src_filter = +<*> -<tab5/> -<stackchan/> -<stackchan.backup-*/> -<roverc/> -<roverc_selftest/> +<buddies/>
lib_deps =
    m5stack/M5Unified @ ^0.2.0
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0

[env:m5stack-sticks3-claude]
extends = env:m5stack-sticks3
; StickS3 enumerates over native USB (usbmodem), not an FTDI bridge. The
; ESP32-S3 presents both a USB-Serial-JTAG port and the CDC-on-boot port;
; either can flash. Pin the port after first identifying it with
;   ls /dev/cu.usbmodem*   (then esptool chip_id / pio device monitor)
; — left unset here so `-t upload --upload-port /dev/cu.usbmodemXXXX` picks it.
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBUDDY_BOARD_STICKS3=1
    ; On-device ES8311 mic capture for the vibecoding dictation stream. The
    ; speaker stays disabled (cfg.internal_spk=false in main.cpp → stick is
    ; silent); the mic is brought up once at boot and primed so runtime
    ; record() never re-installs the I2S driver under load (that re-install was
    ; the TG1 interrupt-watchdog reboot — see audio_capture.cpp audioCaptureInit
    ; and the StickS3 cfg block in main.cpp). Verified end-to-end: PTT gesture →
    ; ES8311 → ADPCM → BLE NUS → host decode → 16 kHz WAV.
    -DBUDDY_S3_MIC_CAPTURE=1
    ; "Claude-S3-" deliberately avoids the "SC" substring that the daemon's
    ; permission-capability heuristic uses to detect button-less StackChan
    ; peers — the S3 stick HAS A/B buttons, so it must read as permission-
    ; capable.
    -DBUDDY_BRAND_PREFIX=\"Claude-S3-\"
    -DBUDDY_BRAND_NAME=\"Claude\"
    -DBUDDY_DEFAULT_CHAR=\"clawd\"

[env:m5stack-sticks3-cursor]
extends = env:m5stack-sticks3
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBUDDY_BOARD_STICKS3=1
    ; On-device ES8311 mic capture (see m5stack-sticks3-claude for the why).
    -DBUDDY_S3_MIC_CAPTURE=1
    -DBUDDY_BRAND_PREFIX=\"Cursor-S3-\"
    -DBUDDY_BRAND_NAME=\"Cursor\"
    -DBUDDY_VARIANT_CURSOR=1
    -DBUDDY_DEFAULT_CHAR=\"clawd\"

; --- StackChan (CoreS3) ---------------------------------------------------
; Brand-new target added 2026-05-13: M5Stack StackChan (K151) — CoreS3 head +
; servo/LED/IR/NFC body. Reuses the cc-bridge / cursor-bridge daemon's BLE
; debug NUS protocol verbatim: advertises as "Claude-SC-XXXX" so the
; existing daemon (which scans by "Claude-" prefix) picks it up with zero
; daemon-side changes. Plus2 + StackChan can't both be connected at once
; until the daemon learns to multiplex; for MVP, unplug one.
;
; Source is fully isolated under src/stackchan/ — build_src_filter excludes
; the Plus2/StickC sources entirely so the two firmwares share nothing but
; this platformio.ini. CoreS3 has 16MB flash + 8MB PSRAM so no_ota.csv
; isn't necessary, but kept for partition-table familiarity. Switch to a
; with-OTA partition once StackChan factory OTA path is mapped.
[env:cores3-stackchan]
platform = espressif32@6.12.0
board = m5stack-cores3
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
; CoreS3 has 16MB flash. default_16MB.csv gives ~6.5MB app + ~6MB littlefs;
; the characters/<pack>/ tree is well under 2MB so plenty of headroom.
; Plus2 uses no_ota.csv via a separate filesystem image; we share the
; same data/ directory at project root, so `pio run -t uploadfs` here
; pushes the same /characters/ tree to CoreS3's littlefs.
board_build.partitions = default_16MB.csv
; CoreS3 has octal PSRAM (qio_opi). We use the m5stack-cores3 board
; default — do NOT force `qio_qspi`, that pins PSRAM into quad mode and
; randomises DMA reads. Symptom: M5.Speaker's PSRAM DMA buffer fills
; with garbage → amp plays continuous loud static at any volume > 0.
; Likewise `-mfix-esp32-psram-cache-issue` is an original-ESP32-only
; silicon workaround; on ESP32-S3 it's at best a no-op, at worst it
; corrupts code generation around PSRAM. Both were inherited from
; GOB52/M5StackCoreS3_CameraWebServer in PR #14 — turns out that repo
; targets generic ESP32-S3 dev boards, not CoreS3 with its octal PSRAM.
build_src_filter = -<*> +<stackchan/>
; StackChan-BSP's utils/uitk/core/math/base.hpp uses C++14 deduced
; return types — default gnu++11 fails to compile it.
build_unflags = -std=gnu++11
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -std=gnu++17
    ; WiFi credentials + daemon host/port pulled from wifi_secrets.ini.
    ; Empty/placeholder values are tolerated — firmware logs a warning
    ; and the camera-stream path stays dormant.
    -DSTACKCHAN_WIFI_SSID=\"${wifi_secrets.ssid}\"
    -DSTACKCHAN_WIFI_PASS=\"${wifi_secrets.pass}\"
    -DSTACKCHAN_DAEMON_HOST=\"${wifi_secrets.host}\"
    -DSTACKCHAN_DAEMON_PORT=${wifi_secrets.port}
    ; UDP port for relayed agent TTS audio (Path A2, audio_play.cpp).
    -DSTACKCHAN_AUDIO_PORT=${wifi_secrets.audio_port}
lib_deps =
    m5stack/M5Unified @ ^0.2.0
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0
    ; StackChan body BSP: 2 feedback servos (X 360° cont, Y 90°), 12
    ; RGB LEDs, IR, NFC, INA226 power monitor, 3-zone touch. Pulled from
    ; github since m5stack registry may not have it under that owner.
    ; Brings IRremoteESP8266 + M5Unit-NFC as transitive deps; we don't
    ; use those but the precompile pulls them. Adds ~70KB flash.
    https://github.com/m5stack/StackChan-BSP.git
    crankyoldgit/IRremoteESP8266 @ ^2.8.6
    https://github.com/m5stack/M5Unit-NFC.git
    ; GC0308 complement driver — patches esp32-camera's bundled GC0308
    ; driver (M5Unified pulls esp32-camera transitively). Pinned to a
    ; commit so the verbatim init sequence in design.md stays stable.
    https://github.com/GOB52/gob_GC0308.git#a488fc636d60b792e9af939a5f4cfbca9a962adf
; Avatar lib intentionally dropped from MVP — see src/stackchan/main.cpp
; for the rationale (user prefers Clawd/Calico GIFs to match Plus2 UX).

[env:cores3-stackchan-claude]
extends = env:cores3-stackchan
build_unflags = -std=gnu++11
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -std=gnu++17
    -DSTACKCHAN_WIFI_SSID=\"${wifi_secrets.ssid}\"
    -DSTACKCHAN_WIFI_PASS=\"${wifi_secrets.pass}\"
    -DSTACKCHAN_DAEMON_HOST=\"${wifi_secrets.host}\"
    -DSTACKCHAN_DAEMON_PORT=${wifi_secrets.port}
    ; Compatibility shim: BSP's FTServo driver uses UART_SCLK_DEFAULT
    ; (newer ESP-IDF) but our pinned arduino-esp32 only exposes
    ; UART_SCLK_XTAL. The two map to the same clock source on S3.
    -DUART_SCLK_DEFAULT=UART_SCLK_XTAL
    -DBUDDY_BRAND_PREFIX=\"Claude-SC-\"
    -DBUDDY_BRAND_NAME=\"Claude\"
    ; 2026-05-13 character iterations:
    ;   clawd    → known clean, default fallback
    ;   calico   → green-channel rot on CoreS3 (disproves the Plus-1.x
    ;     theory). De-interlace alone was not enough; likely needs a
    ;     full palette regen via ffmpeg. Asset-side bug, deferred.
    ;   bufo     → manifest shape mismatch (idle array, busy single).
    ;     Would need manifest.json-driven state loader (~1h). Deferred.
    ;   cloudling → from rullerzhou-afk/clawd-on-desk @ assets/gif/
    ;     cloudling-*.gif. Tried as default; user prefers clawd's
    ;     look so reverted. cloudling assets stay in characters/
    ;     (master pool) if we want to revisit.
    -DBUDDY_DEFAULT_CHAR=\"clawd\"

[env:cores3-stackchan-cursor]
extends = env:cores3-stackchan
build_unflags = -std=gnu++11
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -std=gnu++17
    -DSTACKCHAN_WIFI_SSID=\"${wifi_secrets.ssid}\"
    -DSTACKCHAN_WIFI_PASS=\"${wifi_secrets.pass}\"
    -DSTACKCHAN_DAEMON_HOST=\"${wifi_secrets.host}\"
    -DSTACKCHAN_DAEMON_PORT=${wifi_secrets.port}
    ; Compatibility shim: BSP's FTServo driver uses UART_SCLK_DEFAULT
    ; (newer ESP-IDF) but our pinned arduino-esp32 only exposes
    ; UART_SCLK_XTAL. The two map to the same clock source on S3.
    -DUART_SCLK_DEFAULT=UART_SCLK_XTAL
    -DBUDDY_BRAND_PREFIX=\"Cursor-SC-\"
    -DBUDDY_BRAND_NAME=\"Cursor\"
    -DBUDDY_DEFAULT_CHAR=\"clawd\"

