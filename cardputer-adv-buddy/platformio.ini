; ─────────────────────────────────────────────────────────────────────────
; M5Stack Cardputer-ADV — Claude Code 桌面伴侣固件
;
; 板子事实(均来自 docs.m5stack.com/en/core/Cardputer-Adv，2026-06 核对):
;   SoC      ESP32-S3FN8 (Stamp-S3A), 8MB flash, dual LX7 @240MHz
;   Display  ST7789V2  1.14"  240x135  (LCD: BL=G38 RST=G33 DC=G34
;            MOSI=G35 SCK=G36 CS=G37)
;   Keyboard 56 键 (4x14)
;   IMU      BMI270 (ADV 新增，原版 Cardputer 没有)
;   Audio    ES8311 codec + NS4150B amp + 1W spk + MEMS mic
;   其它     IR / microSD / Grove HY2.0-4P / EXT 2.54-14P / 1750mAh
;
; env 配置逐字采用 M5Stack 官方 PlatformIO 文档(同上页面 > Softwares >
; PlatformIO)。M5Cardputer 库 v1.1.1 的 library.json 明确写
;   "Library for M5Stack M5Cardputer and M5Cardputer-ADV Board"
; 即同一份库 + 同一 board id 同时覆盖原版与 ADV，begin() 内部按硬件自适配。
;
; 初始化序列已对 upstream example 核对(见 src/main.cpp 顶部引用):
;   m5stack/M5Cardputer  examples/Basic/keyboard/inputText/inputText.ino
;   m5stack/M5Cardputer  examples/Basic/display/display.ino
;
; flash/上传:
;   pio run -e cardputer-adv -t upload
;   pio device monitor -e cardputer-adv
; ─────────────────────────────────────────────────────────────────────────
[env:cardputer-adv]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
; ESP32-S3 原生 USB-Serial-JTAG 上「切换波特率」这步偶发失败
; （Changing baud rate to N → No serial data received），任何 >115200 的
; upload_speed 都会触发切换。设 115200 = 与初始一致、esptool 跳过切换，最稳。
; 慢一点（~480KB 约 40s）。换 USB 口/拔插后想提速可调回 921600。
upload_speed = 115200
; 8MB flash (ESP32-S3FN8)。esp32-s3-devkitc-1 默认即 8MB，显式写明以防混淆。
board_upload.flash_size = 8MB
; clawd GIF 角色包放 LittleFS（data/characters/clawd/，约 1.3MB）。
; 自定义分区：factory app 3MB + LittleFS ~4.9MB（见 partitions_clawd_8mb.csv）。
;   pio run -t buildfs   生成 littlefs.bin；下载模式下与 app 一起烧。
board_build.filesystem = littlefs
board_build.partitions = partitions_clawd_8mb.csv
build_flags =
    -DESP32S3
    -DCORE_DEBUG_LEVEL=0
    ; S3 原生 USB-CDC：Serial 走 USB，单根 USB-C 即可烧录+监视，无需外部 UART。
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    ; 官方推荐写法(github 直链)。库会传递引入 M5Unified + M5GFX。
    M5Cardputer=https://github.com/m5stack/M5Cardputer
    ; clawd GIF 解码：与 buddy 家族同款（claude-code-buddy 也用 ^2.1.1）。
    bitbank2/AnimatedGIF @ ^2.1.1
    ; cc-bridge 状态 JSON 解析（claude-code-buddy 同用 ^7）。BLE 用 framework 内置。
    bblanchon/ArduinoJson @ ^7.0.0
