name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-tests:
    name: Python daemon tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: pytest
        run: pytest -q

  cpp-native-tests:
    name: C++ native unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PlatformIO
        run: pip install platformio
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-native-${{ hashFiles('platformio.ini') }}
      - name: pio test -e native
        run: pio test -e native

  firmware-build:
    name: Firmware build (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - m5stickc-plus2-claude
          - m5stickc-plus2-cursor
          - cores3-stackchan-claude
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PlatformIO
        run: pip install platformio
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ matrix.env }}-${{ hashFiles('platformio.ini') }}
      - name: pio run -e ${{ matrix.env }}
        run: pio run -e ${{ matrix.env }}
