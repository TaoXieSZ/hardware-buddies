<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>StackChan</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #000;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      }
      #stage {
        position: relative;
        width: 960px;
        height: 720px;
      }
      #lcd {
        position: absolute;
        inset: 0;
        width: 960px;
        height: 720px;
      }
      /* Character GIF layered over the canvas, inside CHAR_BOX scaled 3×.
         CHAR_BOX: x=4 y=58 w=176 h=162 → 12, 174, 528, 486 */
      #char-wrap {
        position: absolute;
        left: 12px;
        top: 174px;
        width: 528px;
        height: 486px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        pointer-events: none;
      }
      #char {
        width: 100%;
        height: 100%;
        object-fit: contain;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <canvas id="lcd" width="960" height="720"></canvas>
      <div id="char-wrap"><img id="char" src="" alt="" /></div>
    </div>
    <script src="renderer.js"></script>
    <script src="mock.js"></script>
  </body>
</html>
