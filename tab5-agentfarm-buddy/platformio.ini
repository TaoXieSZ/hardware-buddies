; tab5-agentfarm-buddy — M5Stack Tab5 (ESP32-P4) desk pet for Agent Farm.
;
; Shows the Agent Farm (trigger-cursor) trigger feed on the Tab5's 1280x720
; LCD with a reacting clawd GIF avatar. Data arrives over USB-CDC from a
; Mac-side bridge (tools/agentfarm-usb-bridge/bridge.py) that polls the Agent
; Farm admin API on localhost — so the device works on any network, no WiFi
; config needed on the device side (the P4 has no radio anyway).
;
; Platform: the official platformio espressif32 has NO ESP32-P4 support; the
; community pioarduino fork is required. Pinned to #55.03.35 (Arduino 3.3.5 /
; IDF 5.5.1): IDF 5.5.2 introduced a Tab5 MIPI-DSI backlight-flicker regression
; (m5stack/M5GFX#185). Board MUST be m5stack-tab5-p4 (in pioarduino since
; 55.03.35). M5GFX is pinned to the develop BRANCH: the 2026-04 Tab5 batch
; switched the panel to ST7121, whose driver is only on develop (not in any
; tagged release yet — tagged = black screen on this batch).

[env:tab5-agentfarm]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.35
board = m5stack-tab5-p4
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
board_build.flash_mode = qio
; Custom table drops the unused OTA slot so LittleFS gets ~9.6MB — the
; anti-aliased VLW fonts (data/fonts/*.vlw) need ~4MB on top of the clawd GIF
; pack. Changing the table relocates the FS: re-run `-t uploadfs`.
board_build.partitions = partitions_tab5_16MB.csv
; LittleFS holds the VLW fonts + clawd GIF pack (data/). Push once with
;   pio run -e tab5-agentfarm -t uploadfs
board_build.filesystem = littlefs
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    ; ESP32-P4 native USB-Serial-JTAG on the USB-C OTG port (CDC = Serial).
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    m5stack/M5Unified @ ^0.2.17
    https://github.com/m5stack/M5GFX.git#develop
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0
