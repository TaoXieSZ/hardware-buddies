; One-shot ESP32-P4 firmware that updates the Tab5's ESP32-C6 co-processor
; over the existing SDIO link, using esp_hosted 1.4.7 — the SAME protocol
; generation as the factory C6 firmware (1.4.1), whose OTA RPC handlers it
; therefore actually answers. The Arduino host stack (esp-hosted 2.8.x)
; cannot talk to a 1.4.1 slave (scans fail, OTA write times out), so this
; little IDF firmware bridges the gap once:
;
;   pio run -d tools/tab5-c6-updater -t upload --upload-port /dev/cu.usbmodemXXX
;   → watch serial: OTA progress → "OTA done" → slave reboots as 2.8.5
;   → reflash the real firmware (env m5stack-tab5 in the repo root)
;
; The C6 image (esp32c6-v2.8.5.bin from the arduino-esp32 gh-pages hosted/
; dir) is embedded at build time — no network needed anywhere.
[env:tab5-c6-updater]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.35
board = m5stack-tab5-p4
framework = espidf
monitor_speed = 115200
upload_speed = 1500000
; PIO ignores IDF's CONFIG_PARTITION_TABLE_CUSTOM and uses the board default
; (1M factory app — too small for the 1.15MB embedded image + code). Point
; PIO itself at the custom table (4M factory app).
board_build.partitions = partitions.csv
; (binary embedding via EMBED_FILES / board_build.embed_files is broken in
; PIO's espidf integration — the image ships as src/c6fw_data.c instead)
